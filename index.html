<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TågTid">
  <meta name="description" content="Realtidsinformation om tåg vid svenska järnvägsstationer">
  <title>TågTid</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="app-header">
    <button id="btn-back" class="icon-btn" hidden aria-label="Tillbaka">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <h1 id="header-title">TågTid</h1>
    <button id="btn-settings" class="icon-btn" aria-label="Inställningar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <main>

    <!-- Station view -->
    <section id="view-station" class="view">
      <div class="tabs">
        <button class="tab active" data-tab="departures">Avgångar</button>
        <button class="tab"        data-tab="arrivals">Ankomster</button>
      </div>
      <div id="station-action-bar" hidden>
        <button id="btn-fetch-name" class="btn-action">Hämta namn</button>
        <button id="btn-goto-saved-station" class="btn-action btn-action-accent" hidden>Tåg</button>
      </div>
      <ul id="train-list"></ul>
      <div id="last-updated"></div>
    </section>

    <!-- Train detail view -->
    <section id="view-train" class="view">
      <div id="train-detail-header"></div>
      <div class="detail-actions">
        <button id="btn-save-train" class="btn-action">Spara tåg</button>
        <button id="btn-goto-saved" class="btn-action btn-action-accent" hidden>Aktuellt tåg</button>
      </div>
      <div class="ghost-bar">
        <button id="btn-ghost-toggle" class="btn-ghost">Visa spökstationer</button>
        <span class="ghost-info" title="Spökstationer är ej bemannade hållplatser där tåg möts för att kunna passera varandra på enkelspår.">?</span>
      </div>
      <ul id="train-stops"></ul>
    </section>

    <!-- Settings view -->
    <section id="view-settings" class="view">
      <div class="settings-scroll">

        <div class="settings-group">
          <span class="settings-label">API-nyckel (Trafikverket)</span>
          <input id="input-apikey" class="settings-input" type="text"
                 placeholder="Ange din API-nyckel"
                 autocomplete="off" spellcheck="false">
          <span class="settings-hint">
            Gratis nyckel på
            <a href="https://api.trafikinfo.trafikverket.se/" target="_blank" rel="noopener">
              api.trafikinfo.trafikverket.se
            </a>
          </span>
        </div>

        <div class="settings-group">
          <span class="settings-label">Station</span>
          <div class="station-search-wrap">
            <input id="input-station-search" class="settings-input" type="text"
                   placeholder="Sök på stationsnamn…" autocomplete="off">
            <ul id="station-suggestions"></ul>
          </div>
          <div id="selected-station"></div>
          <button id="btn-geolocate" class="btn btn-secondary">
            📍 Hitta närmaste station automatiskt
          </button>
        </div>

        <div class="settings-group">
          <span class="settings-label">Utseende</span>
          <div class="theme-row">
            <span>Tema</span>
            <button id="btn-theme" class="btn btn-secondary">Ljust tema</button>
          </div>
        </div>

        <div class="settings-group">
          <span class="settings-label">App</span>
          <span id="version-display" class="settings-hint"></span>
          <button id="btn-update-app" class="btn btn-secondary">Uppdatera appen</button>
        </div>

        <button id="btn-save-settings" class="btn btn-primary">Spara inställningar</button>

      </div>
    </section>

  </main>
</div>

<div id="toast"></div>

<script src="js/settings.js"></script>
<script src="js/api.js"></script>
<script src="js/location.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
